apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'expo.modules.smsreceiver'
version = '1.0.0'

android {
  namespace 'expo.modules.smsreceiver'
  compileSdkVersion (rootProject.ext.has('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35)

  defaultConfig {
    minSdkVersion (rootProject.ext.has('minSdkVersion') ? rootProject.ext.minSdkVersion : 24)
    targetSdkVersion (rootProject.ext.has('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 35)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
  }

  kotlinOptions {
    jvmTarget = JavaVersion.VERSION_11.toString()
  }
}

dependencies {
  implementation project(':expo-modules-core')
}
